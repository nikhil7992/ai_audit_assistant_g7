server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy — forward all backend calls to FastAPI ──────────────────────
    # BACKEND_URL is substituted at container startup via envsubst
    # It will be the internal Cloud Map DNS of the gateway service
    location /health {
        proxy_pass         ${BACKEND_URL}/health;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 120s;
    }

    location /audit/ {
        proxy_pass         ${BACKEND_URL}/audit/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    location /validate {
        proxy_pass         ${BACKEND_URL}/validate;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 120s;
    }

    location /policies/ {
        proxy_pass         ${BACKEND_URL}/policies/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 120s;
    }

    location /reports {
        proxy_pass         ${BACKEND_URL}/reports;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass         ${BACKEND_URL}/admin/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 120s;
    }

    location /docs {
        proxy_pass         ${BACKEND_URL}/docs;
        proxy_set_header   Host              $host;
        proxy_read_timeout 30s;
    }

    # ── Static React app ──────────────────────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All remaining routes go to index.html (React Router handles client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;
}
